name: CI

on:
  push:
    # 重要なブランチへのpush時に実行 
    branches:
      - main
  pull_request:
    # ブランチからのプルリクエストの作成・更新時に実行
    branches:
      - main
  workflow_dispatch:
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. ソースコードのチェックアウト
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Deno のセットアップ
      - name: Use Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true
        
      # ~~依存関係のインストール~~ Denoでは実行時に必要なモジュールを自動で取得するため不要

      # 3. コンパイルエラーのチェック
      - name: TS check
        run: deno check --frozen . # テスト含めすべてのファイル

      # 4. Lint の実行
      - name: Run lint
        run: deno lint

      # 5. テストの実行
      - name: Run tests
        run: deno test --parallel --frozen

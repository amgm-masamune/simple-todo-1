name: simple-todo-1

services:

  # アプリケーションサーバー
  app:
    build: 
      context: .
      dockerfile: ./docker/app/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgres://${DB_APP_USER}:${DB_APP_PASSWORD}@db:5432/${POSTGRES_DB}
    env_file:
      - ./.env
    depends_on:
      - db
    networks:
      - app-network

  # データベースサーバー
  db:
    image: postgres:17-alpine
    env_file:
      - ./.env
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./docker/db/init:/docker-entrypoint-initdb.d
    networks:
      - app-network
    # ports の外部公開は行わない。

  # データベース内を確認できるツール（開発用）
  adminer:
    image: adminer
    restart: always
    ports:
      - 8090:8080
    networks:
      - app-network

volumes:
  db-data:

networks:
  app-network:
    driver: bridge
